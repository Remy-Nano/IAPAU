name: CD - OVH VPS

on:
  workflow_run:
    workflows: ["CI - E2E (Playwright + Mongo)"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    
    steps:
      - name: Deploy on OVH VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          password: ${{ secrets.OVH_SSH_PASSWORD }}
          port: ${{ secrets.OVH_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu

            APP_DIR="${{ secrets.OVH_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "OVH_APP_DIR secret is empty"
              exit 1
            fi

            cd "$APP_DIR"
            echo "==> Working directory: $(pwd)"

            echo "==> Update source code"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "==> Build and restart container"
            if docker compose version >/dev/null 2>&1; then
              echo "Using docker compose plugin"
              docker compose pull web || true
              docker compose build web
              docker compose up -d web
              COMPOSE_MODE="plugin"
            elif command -v docker-compose >/dev/null 2>&1; then
              echo "Using docker-compose binary"
              docker-compose pull web || true
              docker-compose build web
              docker-compose up -d web
              COMPOSE_MODE="binary"
            else
              echo "Docker Compose unavailable, fallback to plain docker"
              docker build -t studia:1.0.0 .
              docker stop studia || true
              docker rm studia || true
              docker run -d \
                --name studia \
                --restart unless-stopped \
                --env-file .env.docker \
                -p 3000:3000 \
                studia:1.0.0
              COMPOSE_MODE="none"
            fi

            echo "==> Post-deploy checks"
            if [ "$COMPOSE_MODE" = "plugin" ]; then
              docker compose ps
              docker compose logs --tail=50 web || true
            elif [ "$COMPOSE_MODE" = "binary" ]; then
              docker-compose ps
              docker-compose logs --tail=50 web || true
            else
              docker ps
              docker logs --tail=50 studia || true
            fi
            curl -fsS http://localhost:3000/api/health >/dev/null
            echo "Deployment successful"
