name: CD - OVH VPS

on:
  workflow_run:
    workflows: ["CI - E2E (Playwright + Mongo)"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    
    steps:
      - name: Deploy on OVH VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          password: ${{ secrets.OVH_SSH_PASSWORD }}
          port: ${{ secrets.OVH_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu
            set -x

            APP_DIR="${{ secrets.OVH_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "OVH_APP_DIR secret is empty"
              exit 1
            fi

            cd "$APP_DIR"
            echo "==> Working directory: $(pwd)"

            echo "==> Update source code"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "==> Build and restart container"
            if docker ps >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            else
              echo "Docker inaccessible (ni docker ni sudo docker)"
              exit 1
            fi

            echo "Using plain docker deployment"
            $DOCKER build -t studia:1.0.0 .
            $DOCKER stop studia || true
            $DOCKER rm studia || true
            $DOCKER run -d \
              --name studia \
              --restart unless-stopped \
              --env-file .env.docker \
              -p 3000:3000 \
              studia:1.0.0

            echo "==> Post-deploy checks"
            $DOCKER ps
            $DOCKER logs --tail=50 studia || true
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000/api/health >/dev/null; then
                echo "Health check OK"
                break
              fi
              echo "Waiting for app startup... ($i/30)"
              sleep 2
            done
            curl -fsS http://localhost:3000/api/health >/dev/null
            echo "Deployment successful"
